quarkus.application.name=${OTEL_SERVICE_NAME:oficina-os-service}
quarkus.swagger-ui.always-include=true

oficina.observability.enabled=${OFICINA_OBSERVABILITY_ENABLED:true}
oficina.observability.json-logs.enabled=${OFICINA_OBSERVABILITY_JSON_LOGS_ENABLED:${oficina.observability.enabled}}
oficina.observability.metrics.enabled=${OFICINA_OBSERVABILITY_METRICS_ENABLED:${oficina.observability.enabled}}
oficina.observability.tracing.enabled=${OFICINA_OBSERVABILITY_TRACING_ENABLED:${oficina.observability.enabled}}
oficina.observability.deployment-environment=${DEPLOYMENT_ENVIRONMENT:lab}

quarkus.log.console.json.enabled=${oficina.observability.json-logs.enabled}
quarkus.log.console.json.exception-output-type=detailed
quarkus.log.console.json.additional-field."service.name".value=${quarkus.application.name}
quarkus.log.console.json.additional-field."service.namespace".value=oficina
quarkus.log.console.json.additional-field."service.version".value=${quarkus.application.version:unknown}
quarkus.log.console.json.additional-field."deployment.environment".value=${oficina.observability.deployment-environment}

quarkus.micrometer.export.prometheus.path=/q/metrics

quarkus.otel.enabled=true
quarkus.otel.traces.enabled=${oficina.observability.tracing.enabled}
quarkus.otel.traces.exporter=${QUARKUS_OTEL_TRACES_EXPORTER:none}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
quarkus.otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}
quarkus.otel.instrument.vertx-http=false
quarkus.otel.resource.attributes=${OTEL_RESOURCE_ATTRIBUTES:service.namespace=oficina,deployment.environment=lab}
quarkus.otel.traces.suppress-application-uris=/q/health,/q/health/*,/q/metrics,/q/openapi,/q/swagger-ui,/q/swagger-ui/*

quarkus.smallrye-health.openapi.included=false

mp.jwt.verify.issuer=${OFICINA_AUTH_ISSUER:oficina-api}
mp.jwt.verify.audiences=${OFICINA_AUTH_AUDIENCE:oficina-app}

%dev.mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:file:src/main/resources/jwt/publicKey.pem}
%dev.quarkus.log.console.json.enabled=false

%test.mp.jwt.verify.publickey.location=classpath:test-jwt/publicKey.pem
%test.quarkus.log.console.json.enabled=false
%test.quarkus.http.test-port=0

%prod.mp.jwt.verify.issuer=${OFICINA_AUTH_ISSUER}
%prod.mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:oficina_os_user}
quarkus.datasource.password=${DB_PASSWORD:oficina_os_password}
quarkus.datasource.jdbc.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/oficina_os}
quarkus.datasource.reactive.url=${REACTIVE_DATABASE_URL:postgresql://localhost:5432/oficina_os}

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.hibernate-orm.schema-management.strategy=none

%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.port=${DEV_POSTGRES_PORT:32771}
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.flyway.migrate-at-start=true

%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.quarkus.flyway.active=false
%test.quarkus.flyway.clean-at-start=false
%test.quarkus.flyway.migrate-at-start=false

%prod.quarkus.flyway.clean-at-start=false
%prod.quarkus.flyway.migrate-at-start=true
